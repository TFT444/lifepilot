<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LifePilot — The AI operating system that prepares your day before you ask."
    />
    <title>LifePilot — Interactive Demo</title>
    <link rel="stylesheet" href="demo.css" />
  </head>
  <body>
    <div class="page">
      <header class="page-header">
        <img src="logo.svg" alt="LifePilot" class="page-logo" width="160" height="48" />
        <p class="page-tagline">Interactive product demo — mock data from Phase 3</p>
        <div class="page-controls">
          <button type="button" class="ghost-btn" id="btn-restart">Restart demo</button>
          <button type="button" class="ghost-btn" id="btn-theme" aria-pressed="true">Toggle theme</button>
        </div>
      </header>

      <main class="device-stage">
        <div class="device" role="application" aria-label="LifePilot app demo">
          <div class="device-notch" aria-hidden="true"></div>
          <div class="device-screen" id="app-root">
            <!-- Rendered by demo.js -->
          </div>
          <div class="device-home-indicator" aria-hidden="true"></div>
        </div>
      </main>

      <footer class="page-footer">
        <p>
          Mirrors the SwiftUI app on <code>develop</code>: Splash → Onboarding → Home, Timeline,
          Memory, Insights, Settings.
        </p>
      </footer>
    </div>

    <script src="demo.js" type="module"></script>
  </body>
</html>
