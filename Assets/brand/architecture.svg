  <path d="M450,622 C450,640 190,640 190,658" fill="none" stroke="#2c2846" stroke-width="1.2"/>
  <path d="M450,622 C450,640 450,640 450,658" fill="none" stroke="#2c2846" stroke-width="1.2"/>
  <path d="M450,622 C450,640 710,640 710,658" fill="none" stroke="#2c2846" stroke-width="1.2"/>

