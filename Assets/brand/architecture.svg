<svg width="900" height="1500" viewBox="0 0 900 1500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'SF Pro Text', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="3" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="900" height="1500" fill="#07060d"/>

  <!-- Eyebrow -->
  <circle cx="76" cy="46" r="3" fill="url(#flow)"/>
  <text x="90" y="50" font-size="11" letter-spacing="2" fill="#6d6890">SYSTEM ARCHITECTURE</text>

  <!-- Title -->
  <text x="70" y="92" font-size="27" font-weight="700" fill="#f2f0fa">How LifePilot prepares your day</text>
  <text x="70" y="122" font-size="14" fill="#a6a1c2">Nine agents observe. Ghost Brain reasons. You approve. Nothing runs silently.</text>

  <!-- 01 You -->
  <rect x="270" y="160" width="360" height="56" rx="12" fill="#100e1c" stroke="#23203a"/>
  <text x="450" y="182" text-anchor="middle" font-size="10" letter-spacing="1.5" fill="#6d6890">01 · YOU</text>
  <text x="450" y="202" text-anchor="middle" font-size="15" font-weight="600" fill="#f2f0fa">iPhone, iPad, or Mac</text>

  <line x1="450" y1="216" x2="450" y2="248" stroke="url(#flow)" stroke-width="2" marker-end="url(#dot)"/>

  <!-- 02 App -->
  <rect x="270" y="250" width="360" height="56" rx="12" fill="#100e1c" stroke="#23203a"/>
  <text x="450" y="272" text-anchor="middle" font-size="10" letter-spacing="1.5" fill="#6d6890">02 · SURFACE</text>
  <text x="450" y="292" text-anchor="middle" font-size="15" font-weight="600" fill="#f2f0fa">LifePilot — SwiftUI</text>

  <line x1="450" y1="306" x2="450" y2="336" stroke="#2c2846" stroke-width="2"/>

  <!-- Triad -->
  <path d="M450,336 C450,352 240,352 240,368" fill="none" stroke="#2c2846" stroke-width="1.4"/>
  <path d="M450,336 L450,368" fill="none" stroke="#2c2846" stroke-width="1.4"/>
  <path d="M450,336 C450,352 660,352 660,368" fill="none" stroke="#2c2846" stroke-width="1.4"/>

  <g>
    <rect x="130" y="368" width="220" height="50" rx="10" fill="#100e1c" stroke="#23203a"/>
    <text x="240" y="398" text-anchor="middle" font-size="13" font-weight="600" fill="#f2f0fa">Morning Briefing</text>

    <rect x="340" y="368" width="220" height="50" rx="10" fill="#100e1c" stroke="#23203a"/>
    <text x="450" y="398" text-anchor="middle" font-size="13" font-weight="600" fill="#f2f0fa">Unified Timeline</text>

    <rect x="550" y="368" width="220" height="50" rx="10" fill="#100e1c" stroke="#23203a"/>
    <text x="660" y="398" text-anchor="middle" font-size="13" font-weight="600" fill="#f2f0fa">Smart Approvals</text>
  </g>

  <line x1="450" y1="418" x2="450" y2="452" stroke="url(#flow)" stroke-width="2" marker-end="url(#dot)"/>

  <!-- Ghost Brain core -->
  <circle cx="450" cy="560" r="140" fill="url(#coreGlow)"/>
  <rect x="300" y="454" width="300" height="128" rx="20" fill="#150f28" stroke="#45406b"/>
  <g transform="translate(450,492)">
    <path d="M0,-16 L6,-6 L16,0 L6,6 L0,16 L-6,6 L-16,0 L-6,-6 Z" fill="url(#flow)"/>
  </g>
  <text x="450" y="528" text-anchor="middle" font-size="18" font-weight="700" fill="#f2f0fa">Ghost Brain</text>
  <text x="450" y="548" text-anchor="middle" font-size="12" fill="#a6a1c2">The only component that reasons across domains</text>
  <g font-size="9" letter-spacing="0.5" fill="#a6a1c2">
    <rect x="320" y="560" width="66" height="18" rx="9" fill="#100e1c" stroke="#23203a"/>
    <text x="353" y="572" text-anchor="middle">OBSERVE</text>
    <rect x="392" y="560" width="86" height="18" rx="9" fill="#100e1c" stroke="#23203a"/>
    <text x="435" y="572" text-anchor="middle">UNDERSTAND</text>
    <rect x="484" y="560" width="70" height="18" rx="9" fill="#100e1c" stroke="#23203a"/>
    <text x="519" y="572" text-anchor="middle">PREDICT</text>
  </g>

  <text x="450" y="612" text-anchor="middle" font-size="10" letter-spacing="1.5" fill="#6d6890">FUSES OUTPUT OF ↓</text>

