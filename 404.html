<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>LifePilot — Demo</title>
<meta name="description" content="LifePilot — the AI operating system that prepares your day before you ask. Interactive hackathon demo.">
<style>
  :root {
    --void: #05050f;
    --panel: #14121f;
    --panel-2: #1b1830;
    --panel-border: #29253f;
    --ink: #ffffff;
    --ink-dim: #a6a1c2;
    --ink-faint: #6d6890;
    --violet: #a855f7;
    --blue: #38bdf8;
    --risk: #f2557a;
    --success: #34d399;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #app { position: fixed; inset: 0; background: var(--void); color: var(--ink); overflow: hidden; }
  .view {
    position: absolute; inset: 0;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .view::-webkit-scrollbar { display: none; }
  .view.active { opacity: 1; pointer-events: auto; }

  /* SPLASH */
  #view-splash { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.4rem; background: radial-gradient(circle at 50% 40%, #150f28 0%, #05050f 70%); }
  #view-splash .mark { width: 84px; height: 84px; opacity: 0; transform: scale(0.7); }
  #view-splash.active .mark { animation: markIn 1s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  #view-splash .word { font-size: 2.1rem; font-weight: 700; letter-spacing: -0.02em; opacity: 0; }
  #view-splash.active .word { animation: fadeUp 0.7s ease 0.55s forwards; }
  #view-splash .tagline { font-size: 0.95rem; color: var(--ink-dim); text-align: center; padding: 0 3rem; opacity: 0; font-weight: 500; line-height: 1.5; max-width: 420px; }
  #view-splash.active .tagline { animation: fadeUp 0.7s ease 1s forwards; }
  @keyframes markIn { to { opacity: 1; transform: scale(1); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }
  @keyframes popIn { 0% { opacity: 0; transform: scale(0.9);} 100% { opacity: 1; transform: scale(1);} }

  .phone-col { max-width: 480px; margin: 0 auto; min-height: 100%; position: relative; }
  .status-bar { height: 54px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.6rem; font-size: 0.85rem; font-weight: 600; position: sticky; top: 0; z-index: 5; background: linear-gradient(var(--void) 60%, transparent); }
  .content { padding: 0.2rem 1.4rem 6.5rem; }

  /* ---- App header (hamburger / wordmark / avatar) ---- */
  .app-header { display: flex; align-items: center; justify-content: space-between; padding: 0.2rem 0 0.9rem; }
  .app-header .icon-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; color: var(--ink); }
  .app-header .icon-btn svg { width: 20px; height: 20px; }
  .app-header .wordmark { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.01em; }
  .app-header .wordmark .pilot { background: linear-gradient(120deg, var(--violet), var(--blue)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .app-header .avatar-wrap { position: relative; width: 34px; height: 34px; }
  .app-header .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--violet), var(--blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 700; color: #fff;
  }
  .app-header .avatar-dot { position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px; border-radius: 50%; background: var(--violet); border: 2px solid var(--void); }

  .hero-header { margin-bottom: 1.3rem; }
  .hero-header .date { font-size: 0.85rem; color: var(--ink-faint); font-weight: 600; margin-bottom: 0.25rem; }
  .hero-header .greeting { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.02em; }

  .weather-card { display: flex; align-items: center; justify-content: space-between; background: var(--panel); border: 1px solid var(--panel-border); border-radius: 18px; padding: 0.9rem 1.1rem; margin-top: 0.9rem; margin-bottom: 1rem; }
  .weather-left { display: flex; align-items: center; gap: 0.7rem; }
  .weather-left svg { width: 30px; height: 30px; }
  .weather-temp { font-size: 1.3rem; font-weight: 700; }
  .weather-sub { font-size: 0.78rem; color: var(--ink-dim); margin-top: 0.1rem; font-weight: 500; }

  /* ---- Ghost Brain hero card ---- */
  .hero-card {
    position: relative; overflow: hidden;
    border-radius: 26px; padding: 1.5rem 1.4rem; margin-bottom: 1.1rem;
    background: linear-gradient(155deg, rgba(124,58,237,0.16), rgba(56,189,248,0.05)), var(--panel);
    border: 1px solid rgba(168,85,247,0.28);
    box-shadow: 0 25px 60px -24px rgba(124,58,237,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    min-height: 168px;
  }
  .hero-card .text-col { flex: 1; min-width: 0; }
  .hero-card .ghost-label { font-size: 0.68rem; font-weight: 800; letter-spacing: 0.12em; color: var(--violet); text-transform: uppercase; margin-bottom: 0.55rem; }
  .hero-card .headline { font-size: 1.4rem; font-weight: 700; line-height: 1.28; letter-spacing: -0.01em; }
  .hero-card .headline .grad { background: linear-gradient(120deg, var(--violet), var(--blue)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .hero-card .sub { font-size: 0.85rem; color: var(--ink-dim); margin-top: 0.5rem; font-weight: 500; }

  .ghost-status-row { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.75rem; font-size: 0.72rem; font-weight: 600; color: var(--ink-faint); }
  .ghost-status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); flex-shrink: 0; box-shadow: 0 0 0 3px rgba(52,211,153,0.18); animation: statusPulse 2s ease-in-out infinite; }
  @keyframes statusPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
  .ghost-status-text { transition: opacity 0.25s ease; }
  .ghost-status-text.fading { opacity: 0; }
  .ghost-status-sep { opacity: 0.4; }

  .ghost-avatar-wrap { position: relative; width: 108px; height: 108px; flex-shrink: 0; }
  .ghost-avatar-glow {
    position: absolute; inset: -20px; border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.35) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%,100% { opacity: 0.6; transform: scale(1);} 50% { opacity: 1; transform: scale(1.12);} }
  .ghost-avatar-svg { position: relative; width: 100%; height: 100%; animation: ghostFloat 3.4s ease-in-out infinite; }
  @keyframes ghostFloat { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-6px);} }
  .ghost-eye { animation: eyeBlink 4.5s ease-in-out infinite; transform-origin: center; }
  @keyframes eyeBlink { 0%, 92%, 100% { transform: scaleY(1);} 96% { transform: scaleY(0.15);} }

  /* ---- Stat grid (2x3) ---- */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.55rem; margin-bottom: 1.1rem; }
  .stat-tile {
    background: var(--panel); border: 1px solid var(--panel-border); border-radius: 17px;
    padding: 0.75rem 0.7rem; cursor: pointer; transition: transform 0.15s ease, border-color 0.15s ease;
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  .stat-tile:active { transform: scale(0.96); }
  .stat-tile .top-row { display: flex; align-items: flex-start; justify-content: space-between; }
  .stat-tile .icon-badge { width: 30px; height: 30px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; flex-shrink: 0; }
  .stat-tile .icon-badge svg { width: 15px; height: 15px; }
  .stat-tile .chev { color: var(--ink-faint); opacity: 0.6; }
  .stat-tile .chev svg { width: 12px; height: 12px; }
  .stat-tile .big { font-size: 0.98rem; font-weight: 700; line-height: 1.2; }
  .stat-tile .big.accent { color: var(--violet); }
  .stat-tile .small { font-size: 0.68rem; color: var(--ink-faint); font-weight: 500; margin-top: 0.1rem; line-height: 1.3; }
  .stat-tile.pulse { animation: tilePulse 0.6s ease; }
  @keyframes tilePulse { 0% { border-color: var(--panel-border); } 30% { border-color: var(--violet); box-shadow: 0 0 0 3px rgba(168,85,247,0.14); } 100% { border-color: var(--panel-border); box-shadow: none; } }
  .stat-tile .big, .stat-tile .small { transition: opacity 0.2s ease; }

  .confidence-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.1rem; }
  .confidence-track { flex: 1; height: 5px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .confidence-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--violet), var(--blue)); transition: width 1.1s cubic-bezier(0.16,1,0.3,1) 0.3s; }
  .confidence-label { font-size: 0.78rem; font-weight: 700; color: var(--ink-dim); white-space: nowrap; }
  .cta { width: 100%; padding: 0.95rem 0; border-radius: 15px; border: none; background: linear-gradient(135deg, var(--violet), var(--blue)); color: #fff; font-weight: 700; font-size: 0.95rem; cursor: pointer; font-family: inherit; transition: transform 0.15s ease, opacity 0.15s ease; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
  .cta:active { transform: scale(0.97); opacity: 0.9; }
  .cta:disabled { opacity: 0.4; pointer-events: none; }
  .cta svg { width: 16px; height: 16px; }

  /* ---- AI Insight card ---- */
  .insight-highlight {
    display: flex; align-items: flex-start; gap: 0.7rem;
    background: var(--panel); border: 1px solid var(--panel-border); border-radius: 18px;
    padding: 0.9rem 1rem; margin-bottom: 0.6rem; cursor: pointer;
  }
  .insight-highlight .ico { width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0; background: linear-gradient(135deg, rgba(124,58,237,0.22), rgba(56,189,248,0.14)); display: flex; align-items: center; justify-content: center; }
  .insight-highlight .ico svg { width: 17px; height: 17px; color: var(--violet); }
  .insight-highlight .title { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.15rem; }
  .insight-highlight .body { font-size: 0.8rem; color: var(--ink-dim); line-height: 1.45; }
  .insight-highlight .body b { color: var(--violet); font-weight: 700; }

  /* ---- Quick actions row ---- */
  .quick-actions-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.45rem; margin-bottom: 1.1rem; }
  .qa-tile { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; cursor: pointer; }
  .qa-tile .circle { width: 46px; height: 46px; border-radius: 15px; background: var(--panel); border: 1px solid var(--panel-border); display: flex; align-items: center; justify-content: center; transition: transform 0.15s ease; }
  .qa-tile:active .circle { transform: scale(0.9); }
  .qa-tile .circle svg { width: 19px; height: 19px; }
  .qa-tile .lbl { font-size: 0.6rem; font-weight: 600; color: var(--ink-dim); }

  .section-label { display: flex; align-items: center; justify-content: space-between; gap: 0.45rem; font-size: 0.98rem; font-weight: 700; margin: 1.3rem 0 0.65rem; }
  .section-label .left { display: flex; align-items: center; gap: 0.45rem; }
  .section-label svg { width: 16px; height: 16px; flex-shrink: 0; }
  .section-label .count { font-size: 0.72rem; font-weight: 700; color: var(--ink-faint); }

  .card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 18px; padding: 0.9rem 1rem; margin-bottom: 0.6rem; }
  .empty-card { text-align: center; padding: 1.6rem 1rem; color: var(--ink-faint); font-size: 0.85rem; font-weight: 500; }

  .rec-row { display: flex; align-items: center; gap: 0.65rem; padding: 0.7rem 0; border-bottom: 1px solid var(--panel-border); animation: popIn 0.35s ease; }
  .rec-row:last-child { border-bottom: none; }
  .rec-row .icon { width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1rem; background: linear-gradient(135deg, rgba(168,85,247,0.16), rgba(56,189,248,0.16)); }
  .rec-row .body { flex: 1; min-width: 0; cursor: pointer; }
  .rec-row .title { font-size: 0.87rem; font-weight: 600; }
  .rec-row .why { font-size: 0.74rem; color: var(--ink-dim); margin-top: 0.15rem; }
  .rec-row .badge { font-size: 0.62rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 999px; margin-top: 0.3rem; display: inline-block; }
  .rec-row .badge.high { background: rgba(242,85,122,0.16); color: var(--risk); }
  .rec-row .badge.med { background: rgba(56,189,248,0.16); color: var(--blue); }
  .quick-approve { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--panel-border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; background: transparent; }
  .quick-approve svg { width: 14px; height: 14px; opacity: 0; transition: opacity 0.15s ease; }
  .quick-approve.done { background: var(--success); border-color: var(--success); }
  .quick-approve.done svg { opacity: 1; }

  .timeline-row { display: flex; gap: 0.7rem; align-items: flex-start; padding: 0.6rem 0; }
  .timeline-row .time { width: 50px; flex-shrink: 0; text-align: left; font-size: 0.78rem; font-weight: 700; color: var(--ink-dim); padding-top: 0.15rem; }
  .timeline-row .rail { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .timeline-row .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--violet); box-shadow: 0 0 0 4px rgba(168,85,247,0.14); margin-top: 0.22rem; transition: background 0.3s ease, box-shadow 0.3s ease; }
  .timeline-row .dot.done { background: var(--success); box-shadow: 0 0 0 4px rgba(52,211,153,0.14); }
  .timeline-row .line { width: 2px; flex: 1; background: var(--panel-border); margin-top: 0.3rem; min-height: 28px; }
  .timeline-row:last-child .line { display: none; }
  .timeline-row .info { flex: 1; min-width: 0; }
  .timeline-row .info .title-row { display: flex; align-items: center; flex-wrap: wrap; gap: 0.4rem; }
  .timeline-row .info .title { font-size: 0.9rem; font-weight: 600; }
  .timeline-row .info .sub { font-size: 0.75rem; color: var(--ink-faint); margin-top: 0.1rem; }
  .timeline-row .tag { font-size: 0.62rem; font-weight: 700; color: var(--success); background: rgba(52,211,153,0.14); padding: 0.15rem 0.5rem; border-radius: 999px; }
  .timeline-row .countdown { font-size: 0.68rem; font-weight: 700; color: var(--blue); background: rgba(56,189,248,0.12); padding: 0.28rem 0.6rem; border-radius: 999px; white-space: nowrap; flex-shrink: 0; margin-left: auto; align-self: flex-start; }
  .timeline-row .recommended { font-size: 0.68rem; font-weight: 700; color: var(--violet); background: rgba(168,85,247,0.14); padding: 0.28rem 0.6rem; border-radius: 999px; white-space: nowrap; flex-shrink: 0; margin-left: auto; align-self: flex-start; }
  .timeline-row .now-badge { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.04em; color: var(--void); background: var(--success); padding: 0.22rem 0.55rem; border-radius: 999px; white-space: nowrap; flex-shrink: 0; margin-left: auto; align-self: flex-start; display: inline-flex; align-items: center; gap: 0.3rem; animation: nowBadgePulse 1.6s ease-in-out infinite; }
  @keyframes nowBadgePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(52,211,153,0.5); } 50% { box-shadow: 0 0 0 5px rgba(52,211,153,0); } }
  .timeline-row.is-now .info .title { color: var(--success); }
  .timeline-row.is-past { opacity: 0.55; }
  .timeline-row.is-future { opacity: 0.72; }
  .timeline-header-row { display: flex; align-items: center; justify-content: space-between; }
  .timeline-header-row .view-full { font-size: 0.8rem; font-weight: 700; color: var(--violet); cursor: pointer; }

  /* ---- Live activity feed ---- */
  .activity-feed { display: flex; flex-direction: column; gap: 0.1rem; }
  .activity-row { display: flex; align-items: center; gap: 0.55rem; padding: 0.4rem 0; font-size: 0.74rem; color: var(--ink-faint); animation: activityIn 0.4s ease; }
  @keyframes activityIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .activity-row.fading { opacity: 0; transform: translateY(4px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .activity-row .a-time { font-weight: 700; color: var(--ink-dim); width: 42px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .activity-row .a-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--violet); flex-shrink: 0; }
  .activity-row .a-text { flex: 1; }

  /* ---- Floating AI alert ---- */
  .ai-alert-stack { position: fixed; top: calc(0.8rem + env(safe-area-inset-top)); left: 0; right: 0; z-index: 80; display: flex; justify-content: center; pointer-events: none; }
  .ai-alert { width: calc(100% - 1.6rem); max-width: 420px; background: rgba(20,18,31,0.92); backdrop-filter: blur(20px); border: 1px solid rgba(168,85,247,0.35); border-radius: 20px; padding: 0.9rem 1rem; box-shadow: 0 20px 45px -18px rgba(0,0,0,0.6); pointer-events: auto; transform: translateY(-140%); opacity: 0; transition: transform 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease; }
  .ai-alert.show { transform: translateY(0); opacity: 1; }
  .ai-alert .a-head { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  .ai-alert .a-icon { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--violet), var(--blue)); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
  .ai-alert .a-title { font-size: 0.78rem; font-weight: 700; }
  .ai-alert .a-body { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.15rem; }
  .ai-alert .a-rec { font-size: 0.78rem; color: var(--ink-dim); margin-bottom: 0.7rem; }
  .ai-alert .a-rec b { color: var(--blue); font-weight: 700; }
  .ai-alert .a-buttons { display: flex; gap: 0.5rem; }
  .ai-alert .a-buttons button { flex: 1; font-family: inherit; font-size: 0.78rem; font-weight: 700; padding: 0.5rem 0; border-radius: 10px; cursor: pointer; border: none; }
  .ai-alert .a-approve { background: linear-gradient(135deg, var(--violet), var(--blue)); color: #fff; }
  .ai-alert .a-dismiss { background: var(--panel-2); color: var(--ink-dim); border: 1px solid var(--panel-border) !important; }

  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; padding: 0.8rem 0.5rem calc(1.2rem + env(safe-area-inset-bottom)); background: rgba(20,18,31,0.85); backdrop-filter: blur(24px); border-top: 1px solid var(--panel-border); z-index: 10; }
  .tab-bar-inner { display: flex; justify-content: space-around; width: 100%; max-width: 480px; }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; color: var(--ink-faint); font-size: 0.64rem; font-weight: 600; cursor: pointer; padding: 0.2rem 0.6rem; position: relative; }
  .tab svg { width: 22px; height: 22px; }
  .tab.tab-active { color: var(--violet); }
  .tab .dot-badge { position: absolute; top: -1px; right: 8px; width: 7px; height: 7px; border-radius: 50%; background: var(--risk); }

  /* SHEET */
  #view-sheet { background: rgba(0,0,0,0.55); display: flex; align-items: flex-end; }
  .sheet-wrap { width: 100%; max-width: 480px; margin: 0 auto; }
  .sheet { background: var(--panel); border-radius: 28px 28px 0 0; max-height: 90vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.45s cubic-bezier(0.16,1,0.3,1); border-top: 1px solid var(--panel-border); }
  #view-sheet.active .sheet { transform: translateY(0); }
  .sheet-handle { width: 38px; height: 4px; border-radius: 999px; background: var(--panel-border); margin: 0.8rem auto 0.4rem; flex-shrink: 0; }
  .sheet-body { padding: 0.8rem 1.5rem 1.4rem; overflow-y: auto; }
  .sheet-badge { display: inline-block; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.03em; padding: 0.25rem 0.6rem; border-radius: 999px; margin-bottom: 0.8rem; }
  .sheet-badge.high { background: rgba(242,85,122,0.16); color: var(--risk); }
  .sheet-badge.med { background: rgba(56,189,248,0.16); color: var(--blue); }
  .sheet-body h2 { font-size: 1.35rem; font-weight: 700; margin: 0 0 0.3rem; line-height: 1.3; }
  .sheet-meta-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--ink-dim); font-weight: 500; margin-bottom: 0.6rem; }
  .sheet-meta-row svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sheet-section-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-faint); margin: 1.1rem 0 0.5rem; }
  .benefit-row { display: flex; align-items: center; gap: 0.55rem; padding: 0.4rem 0; font-size: 0.9rem; font-weight: 500; }
  .benefit-row .check { width: 20px; height: 20px; border-radius: 50%; background: rgba(52,211,153,0.16); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .benefit-row .check svg { width: 11px; height: 11px; }
  .sheet-buttons { display: flex; gap: 0.7rem; margin-top: 1.4rem; }

  function homeTimelineRowsHTML() {
    const nowIdx = currentTimelineIndex();
    return state.timeline.map((t, i) => {
      const cls = t.done ? 'is-past' : (i === nowIdx ? 'is-now' : 'is-future');
      let rightChip;
      if (i === nowIdx && !t.done) rightChip = `<span class="now-badge"><span style="width:5px;height:5px;border-radius:50%;background:var(--void);display:inline-block"></span>NOW</span>`;
      else if (t.tag) rightChip = `<span class="recommended">${t.tag}</span>`;
      else rightChip = `<span class="countdown">${countdownFor(t.time)}</span>`;
      return `
          <div class="timeline-row ${cls}">
            <div class="time">${t.time}</div>
            <div class="rail"><div class="dot ${t.done ? 'done' : ''}"></div>${i < state.timeline.length - 1 ? '<div class="line"></div>' : ''}</div>
            <div class="info">
              <div class="title-row">

                ${t.sub ? `<span style="font-size:0.75rem;color:var(--ink-faint);font-weight:500">${t.sub}</span>` : ''}
              </div>
            </div>
            ${rightChip}
          </div>
        `;
    }).join('');
  }

  function currentTimelineIndex() {
    const idx = state.timeline.findIndex(t => !t.done);
    return idx === -1 ? state.timeline.length - 1 : idx;

  function activityRowsHTML() {

    return state.activity.slice(0, 5).map(a => `

        <span class="a-text">${a.text}</span>

  function countdownFor(timeStr) {
    // purely cosmetic countdown chip, derived from the mock time string
    const [h, m] = timeStr.split(':').map(Number);
    const total = h * 60 + m;
    const nowTotal = 8 * 60 + 15; // pretend "now" is 8:15 AM to match the 08:30 leave time
    const diff = total - nowTotal;
    if (diff <= 0) return 'Now';
    const hh = Math.floor(diff / 60), mm = diff % 60;
    return hh > 0 ? `In ${hh}h ${mm}m` : `In ${mm}m`;
  }

  function doApprove(id, showAnimation) {
    const r = state.recommendations.find(x => x.id === id);
    r.approved = true;

    // mutate timeline / insights based on which rec was approved
    if (id === 'r1') {
      const leave = state.timeline.find(t => t.title === 'Leave Home');
      if (leave) { leave.time = '08:15'; leave.sub = '15 min earlier'; leave.done = true; leave.tag = 'Updated'; }
    }
    if (id === 'r2') {
      const t = state.timeline.find(t => t.title === 'Leave Home');
      if (t) t.sub = (t.sub ? t.sub + ' · ' : '') + 'Umbrella reminder set';
    }

    const approvedCount = state.recommendations.filter(x => x.approved).length;
    const insight = state.insights.find(i => i.id === 'approvedCount');
    if (insight) { insight.value = String(approvedCount); insight.up = approvedCount > 0; }

    if (showAnimation) {
      document.getElementById('approving-msg').textContent = 'Your day has been updated.';
      document.getElementById('approving-sub').textContent = `${r.title} — done.`;
      showView('view-approving');
      setTimeout(() => {

        if (stillPending) { goTab('home'); }
        else { showView('view-success'); document.getElementById('success-msg').textContent = `Your day is ready, ${state.user}.`; }
      }, 2000);
    } else {
      showToast(`✓ ${r.title}`);
      renderBriefing();
      refreshAllTabBars();
    }
  }

    const dismiss = () => {
      alertEl.classList.remove('show');
      setTimeout(() => alertEl.remove(), 500);
    };
    alertEl.querySelector('.a-dismiss').onclick = dismiss;
    alertEl.querySelector('.a-approve').onclick = () => {
      if (pick.action) {
        const r = state.recommendations.find(x => x.id === pick.action);
        if (r && !r.approved) doApprove(pick.action, false);
      } else {
        showToast(`✓ ${pick.rec}`);
      }
      dismiss();
    };
    pushActivity(pick.body);
    setTimeout(dismiss, 6000);
  }

  function randomInterval(minMs, maxMs, fn) {
    const delay = minMs + Math.random() * (maxMs - minMs);
    setTimeout(() => { fn(); randomInterval(minMs, maxMs, fn); }, delay);
  }

  randomInterval(4000, 8000, tickStatus);
  randomInterval(5000, 9000, tickLiveTile);
  randomInterval(6000, 10000, tickCta);
  randomInterval(8000, 14000, tickTimeline);
  randomInterval(15000, 30000, showAiAlert);

  setTimeout(() => { goTab('home'); }, 3200);
</script>
</body>
</html>
