name: Deploy Demo

on:
  push:
    branches: [main, develop]
    paths:
      - "demo/**"
      - "Website/public/**"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy-demo-pages
  cancel-in-progress: true

jobs:
  resolve-demo-dir:
    name: Resolve demo source directory
    runs-on: ubuntu-latest
    outputs:
      publish_dir: ${{ steps.pick.outputs.publish_dir }}
    steps:
      - uses: actions/checkout@v4
      - id: pick
        run: |
          if [ -d Website/public ] && [ -f Website/public/index.html ]; then
            echo "publish_dir=Website/public" >> "$GITHUB_OUTPUT"
          elif [ -d demo ] && [ -f demo/index.html ]; then
            echo "publish_dir=demo" >> "$GITHUB_OUTPUT"
          else
            echo "No demo directory found" >&2
            exit 1
          fi

  publish-gh-pages-branch:
    name: Publish to gh-pages branch
    needs: resolve-demo-dir
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ needs.resolve-demo-dir.outputs.publish_dir }}
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: update interactive demo"

  deploy-github-pages:
    name: Deploy GitHub Pages
    needs: publish-gh-pages-branch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ needs.resolve-demo-dir.outputs.publish_dir }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
