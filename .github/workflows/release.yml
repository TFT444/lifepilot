name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Publish Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build (Release configuration)
        run: |
          xcodebuild build \
            -scheme LifePilot \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Generate changelog excerpt
        id: changelog
        run: |
          awk '/^## \[/{if (found) exit; found=1; next} found' CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LifePilot ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      # TODO: Wire up App Store Connect / TestFlight upload once
      # Phase 7 (App Store Release) begins. See ROADMAP.md.
