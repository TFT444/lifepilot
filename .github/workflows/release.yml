name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Publish Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build Swift packages (Release)
        run: swift build -c release

      - name: Run unit tests
        run: swift test

      - name: Build iOS app (if Xcode project present)
        run: |
          if [ -d "App/LifePilot.xcodeproj" ]; then
            xcodebuild build \
              -project App/LifePilot.xcodeproj \
              -scheme LifePilot \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "No Xcode project found — skipping app archive."
          fi

      - name: Generate changelog excerpt
        id: changelog
        run: |
          awk '/^## \[/{if (found) exit; found=1; next} found' CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: LifePilot ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      # TODO: Wire up App Store Connect / TestFlight upload in Phase 9.
      # See MASTER_ROADMAP.md Phase 9 — Public Beta.
