name: Task
description: Track an engineering task that isn't a bug or a user-facing feature
title: "chore: <short description>"
labels: ["type: task", "status: triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done, and why?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this task is complete?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core
        - Agents
        - DesignSystem
        - Services
        - Infrastructure / CI
        - Documentation
        - Other
    validations:
      required: true
